static_resources:
  listeners:
    - name: redis_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 6379
      filter_chains:
        - filters:
            - name: envoy.filters.network.redis_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.redis_proxy.v3.RedisProxy
                stat_prefix: redis_egress
                settings:
                  op_timeout: 5s
                  # 关键配置：启用重定向处理，让 Envoy 能感知集群拓扑
                  enable_redirection: true
                  # 支持读取副本，提高读吞吐 (可选)
                  read_policy: REPLICA
                prefix_routes:
                  catch_all_route:
                    cluster: redis_cluster
                downstream_auth_passwords:
                  inline_string: "1241936d"

  clusters:
    - name: redis_cluster
      type: STRICT_DNS # 使用 DNS 解析服务名
      typed_extension_protocol_options:
        envoy.filters.network.redis_proxy:
          "@type": type.googleapis.com/envoy.extensions.filters.network.redis_proxy.v3.RedisProtocolOptions
          auth_password:
            inline_string: "1241936d"
      load_assignment:
        cluster_name: redis_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: redis-node0
                      port_value: 6379
              - endpoint:
                  address:
                    socket_address:
                      address: redis-node1
                      port_value: 6379
              - endpoint:
                  address:
                    socket_address:
                      address: redis-node2
                      port_value: 6379
              - endpoint:
                  address:
                    socket_address:
                      address: redis-node3
                      port_value: 6379
              - endpoint:
                  address:
                    socket_address:
                      address: redis-node4
                      port_value: 6379
              - endpoint:
                  address:
                    socket_address:
                      address: redis-node5
                      port_value: 6379

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 8001
