services:
  x-nginx:
    image: nginx:1.29.5
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
  x-mysql:
    image: mysql:9.5
    restart: unless-stopped
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
  x-redis:
    image: redis:8.4.0
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
  x-opensearch:
    image: opensearchproject/opensearch:3.5.0
    environment:
      cluster.name: ${OPENSEARCH_CLUSTER_NAME}
      network.host: 0.0.0.0
      bootstrap.memory_lock: true
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      discovery.seed_hosts:
    ulimits:
      nproc: 65535
      nofile: 65535
      memlock: -1
  opensearch-dashboard:
    image: opensearchproject/opensearch-dashboards:3.5.0
    environment:
      OPENSEARCH_HOSTS: ["https://os-nginx:9200"]
      opensearch.password: ${INITIAL_ADMIN_PASSWORD}
      data_source.enabled: true
      workspace.enabled: true
      explore.enabled: true
